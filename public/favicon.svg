<svg xmlns="http://www.svg.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- App Squircle Background -->
  <rect width="256" height="256" rx="60" fill="url(#bgGrad)"/>
  
  <!-- Clock Ring -->
  <circle cx="128" cy="128" r="76" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Inner Dynamic Flow (Clock Hands) -->
  <path d="M128 72 L128 128 L172 156" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
  
  <!-- Center Pivot -->
  <circle cx="128" cy="128" r="14" fill="#ffffff" filter="url(#shadow)"/>
  
  <!-- Flow Wave Accent outside the clock -->
  <path d="M 52 128 C 52 170, 86 204, 128 204" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="10" stroke-linecap="round"/>
</svg>
