```svg
<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 256 256"
>
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F46E5" />
            <stop offset="100%" stop-color="#EC4899" />
        </linearGradient>

        <filter
            id="shadow"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%"
        >
            <feDropShadow
                dx="0"
                dy="6"
                stdDeviation="6"
                flood-opacity="0.3"
            />
        </filter>
    </defs>

    <!-- Background -->
    <rect
        x="0"
        y="0"
        width="256"
        height="256"
        rx="60"
        fill="url(#bgGrad)"
    />

    <!-- Clock face -->
    <circle
        cx="128"
        cy="128"
        r="76"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="18"
        stroke-linecap="round"
        filter="url(#shadow)"
    />

    <!-- Clock hands -->
    <path
        d="M128 72 V128 L172 156"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="18"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#shadow)"
    />

    <!-- Clock center -->
    <circle
        cx="128"
        cy="128"
        r="14"
        fill="#FFFFFF"
        filter="url(#shadow)"
    />

    <!-- Decorative highlight arc -->
    <path
        d="M52 128 C52 170 86 204 128 204"
        fill="none"
        stroke="rgba(255,255,255,0.4)"
        stroke-width="10"
        stroke-linecap="round"
    />
</svg>
