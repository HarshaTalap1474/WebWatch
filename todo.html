<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus Tasks - FocusFlow</title>
    <link rel="icon" type="image/svg+xml" href="/clock-check.svg" />
    
    <!-- Meta tags for PWA / Mobile -->
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dracula">
    <div class="bg-gradient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <h1>FocusFlow</h1>
                <span class="header-tag">Tasks</span>
            </div>
            <div class="header-controls">
                <a href="index.html" class="icon-btn" title="Back to Timer" style="text-decoration: none; display: flex; align-items: center; gap: 8px; width: auto; padding: 0 16px; border-radius: var(--radius-full);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    <span style="font-size: 14px; font-weight: 500;">Back to Timer</span>
                </a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 40px;">
            <div class="tasks-widget" style="width: 100%; max-width: 800px; margin: 0; background: var(--glass-panel-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: var(--radius-xl); padding: 30px; box-shadow: var(--shadow-xl);">
                <h3 class="tasks-title" style="margin-bottom: 20px; font-size: 20px; display: flex; align-items: center; gap: 10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    My Focus Tasks
                </h3>
                
                <div class="task-input-group">
                    <input type="text" id="taskInput" class="input-field" placeholder="What are you working on?">
                    <button class="btn btn-primary" id="addTaskBtn" style="width: auto; padding: 0 20px;">
                        Add Task
                    </button>
                </div>
                
                <ul class="task-list" id="taskList" style="max-height: 55vh; padding-right: 10px;">
                    <!-- Tasks will be injected here by JS -->
                </ul>
            </div>
        </main>
        
        <!-- Footer -->
        <footer class="app-footer">
            <p>Made with ❤️ by HarshaTalap1474</p>
            <div class="social-links">
                <a href="https://github.com/HarshaTalap1474" target="_blank" rel="noopener noreferrer" title="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                </a>
                <a href="https://harshalabs.online" target="_blank" rel="noopener noreferrer" title="Portfolio">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </a>
            </div>
        </footer>
    </div>

    <!-- Theming script -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dracula';
        document.body.dataset.theme = savedTheme;
    </script>
    <script type="module" src="todo.js"></script>
</body>
</html>
