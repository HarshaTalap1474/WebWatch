<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - FocusFlow</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .todo-page-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .todo-panel {
            width: 100%;
            max-width: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .todo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }

        .todo-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-color);
            font-weight: 500;
            transition: all var(--transition-speed);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .todo-input-wrapper {
            display: flex;
            gap: 12px;
        }

        .todo-input-wrapper .input-field {
            flex: 1;
            margin-bottom: 0;
            font-size: 16px;
            padding: 14px;
        }

        .todo-input-wrapper .btn-primary {
            padding: 0 24px;
            border-radius: var(--radius);
            font-weight: 600;
        }

        .todo-list-container {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        .todo-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .todo-list-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .todo-list-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 6px;
        }
    </style>
</head>
<body class="theme-dracula">
    <div class="bg-gradient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="todo-page-container">
        <div class="todo-panel">
            <div class="todo-header">
                <h1 class="todo-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    My Tasks
                </h1>
                <a href="index.html" class="back-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back
                </a>
            </div>

            <div class="todo-input-wrapper">
                <input type="text" id="taskInput" class="input-field" placeholder="What needs to be done?">
                <button class="btn btn-primary" id="addTaskBtn">Add Task</button>
            </div>

            <ul class="todo-list-container task-list" id="taskList">
                <!-- Tasks injected here -->
            </ul>
        </div>
    </div>

    <!-- Theming script to ensure consistency with main app -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dracula';
        document.body.className = `theme-${savedTheme}`;
    </script>
    
    <script type="module" src="todo.js"></script>
</body>
</html>
